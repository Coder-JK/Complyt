name: Vulnerability Evidence Pack

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1" # Weekly on Monday at 03:00 UTC

permissions:
  contents: read

jobs:
  vuln-pack:
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned for supply-chain hardening
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate SBOM (CycloneDX)
        run: |
          mkdir -p artifacts
          node -e "
            const { generateSbom } = require('./apps/web/src/lib/evidence/sbom');
            generateSbom('.').then(sbom => {
              require('fs').writeFileSync('artifacts/sbom.json', JSON.stringify(sbom, null, 2));
              console.log('SBOM generated:', sbom.components.length, 'components');
            });
          " || echo "SBOM generation requires build step, skipping in CI"

      - name: Download CISA KEV
        run: |
          mkdir -p artifacts
          curl -fsSL \
            https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json \
            -o artifacts/kev.json
          echo "KEV catalog downloaded: $(jq '.count' artifacts/kev.json) entries"

      - name: Upload evidence artifacts
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: vuln-evidence-pack
          path: artifacts/
          retention-days: 90
